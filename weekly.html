<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digital Finance Team — Product Roadmap 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161921; --border: rgba(255,255,255,0.07);
    --text: #e8eaf0; --muted: #6b7280;
    --forecast: #3b82f6; --ai: #8b5cf6; --reports: #10b981;
    --dashboards: #f59e0b; --integrations: #f43f5e; --metrics: #06b6d4;
    /* Digital Finance Team areas */
    --platform: #3b82f6; --data: #06b6d4; --context: #8b5cf6;
    --agents: #10b981; --workflows: #f59e0b; --cabinet: #f43f5e;
    --settings: #6366f1; --artifacts: #ec4899; --slack: #14b8a6; --crosscut: #94a3b8;
    --aidev: #f97316; --docs: #0ea5e9;
    --ship: #22c55e; --discovery: #f59e0b; --planned: #6366f1;
  }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 28px 28px; }

  .header { margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; position: sticky; top: 0; z-index: 100; background: #0d0f14; padding-top: 14px; margin-top: -14px; padding-bottom: 4px; }
  #stickyAnchor { height: 0; position: sticky; top: 0; z-index: 9; }
  .header-left h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  .header-left p { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .mode-toggle { display: flex; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; flex-shrink: 0; }
  .mode-btn { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

  .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Search */
  #roadmapSearch {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px 4px 30px;
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 11px;
    width: 180px; outline: none; transition: all 0.15s;
  }
  #roadmapSearch::placeholder { color: var(--muted); }
  #roadmapSearch:focus { border-color: rgba(255,255,255,0.2); width: 220px; }
  #searchWrap { position: relative; display: flex; align-items: center; }
  #searchWrap svg { position: absolute; left: 9px; opacity: 0.4; pointer-events: none; }
  #searchClear {
    display: none; position: absolute; right: 9px;
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; line-height: 1; padding: 0;
  }
  #searchClear:hover { color: #fff; }
  #roadmapSearch:not(:placeholder-shown) ~ #searchClear { display: block; }
  .filter-btn { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 500; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { color: #fff; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.09); }
  .filter-btn[data-filter="marketing"] { border-color: rgba(249,115,22,0.3); color: #f97316; background: rgba(249,115,22,0.08); }
  .filter-btn[data-filter="marketing"]:hover, .filter-btn[data-filter="marketing"].active { background: rgba(249,115,22,0.18); border-color: rgba(249,115,22,0.5); color: #fb923c; }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
  .sep { width: 1px; height: 13px; background: var(--border); margin: 0 2px; }

  /* DETAILED */
  .timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .col-header { padding: 11px 13px; border-radius: 10px 10px 0 0; position: sticky; top: var(--header-h, 0px); z-index: 10; }
  .col-header .month { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: #fff; }
  .col-header .subtitle { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .col-now .col-header  { background: #0d1710; border-top: 2px solid var(--ship); }
  .col-feb .col-header  { background: #0d1710; border-top: 2px solid var(--ship); }
  .col-feb, .col-now, .col-apr, .col-may, .col-jun, .col-q3 { display: flex; flex-direction: column; }
  .col-apr .col-header  { background: #0d1710; border-top: 2px solid var(--ship); }
  .col-may .col-header  { background: #0f0f18; border-top: 2px solid var(--planned); }
  .col-jun .col-header  { background: #131008; border-top: 2px solid var(--discovery); }
  .col-q3  .col-header  { background: #0f1012; border-top: 2px solid #4b5563; }
  .col-body { display: flex; flex-direction: column; gap: 7px; padding: 9px; background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; }

  .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: all 0.15s; }
  .card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.13); }
  .card.hidden { display: none; }

  /* Preview image */
  .card-preview { position: relative; width: 100%; height: 120px; overflow: hidden; background: #0d0f14; border-bottom: 1px solid var(--border); display: none; cursor: pointer; }
  .card-preview.loaded { display: block; }
  .card-preview img { width: 100%; height: 100%; object-fit: cover; object-position: top; opacity: 0; transition: opacity 0.3s; display: block; }
  .card-preview img.img-loaded { opacity: 1; }
  .card-preview-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(13,15,20,0.7) 100%); pointer-events: none; }
  .card-preview-open {
    position: absolute; bottom: 7px; right: 7px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
    background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
    padding: 2px 7px; backdrop-filter: blur(4px);
    text-decoration: none; pointer-events: all;
    transition: all 0.12s;
  }
  .card-preview-open:hover { background: rgba(0,0,0,0.85); color: #fff; }

  .card-content { padding: 9px 10px; }
  .card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .area-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .area-label { font-size: 9px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; opacity: 0.75; }
  .status-badge { margin-left: auto; font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
  .badge-ship      { background: rgba(34,197,94,0.15);  color: #22c55e; }
  .badge-delivery  { background: rgba(34,197,94,0.15);  color: #22c55e; }
  .badge-ready     { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-discovery { background: rgba(99,102,241,0.15); color: #818cf8; }
  .badge-planned   { background: rgba(107,114,128,0.12); color: #6b7280; }
  .badge-shipped   { background: rgba(34,197,94,0.10);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

  /* Marketing release indicator */
  .card[data-marketing="true"] { border-left: 3px solid #f97316; }
  .mkt-badge {
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 5px;
    font-size: 9px; color: #f97316;
    background: rgba(249,115,22,0.12);
    border: 1px solid rgba(249,115,22,0.3);
    border-radius: 4px;
    padding: 1px 5px;
    font-weight: 700; letter-spacing: 0.3px;
    cursor: default;
  }
  .mkt-badge::before { content: "✦ "; }
  .mkt-badge::after  { content: " marketing"; }

  /* Past columns — hidden by default, revealed by toggle */
  .col-past { display: none !important; }
  .col-past.past-visible { display: flex !important; }

  /* Past toggle button — sticky vertical pill left of timeline */
  #pastToggleBtn {
    display: none; /* shown via JS when past cols exist */
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer; transition: all 0.15s;
    flex-shrink: 0;
    width: 26px;
    position: sticky;
    top: calc(var(--header-h, 120px) + 8px);
    align-self: flex-start;
  }
  #pastToggleBtn:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.15); }
  /* Arrow — plain character, no rotation, points right (›) or left (‹) */
  #pastToggleBtn .ptb-icon {
    font-size: 15px; line-height: 1;
    display: block;
    transition: opacity 0.15s;
  }
  /* Label — vertical text, bottom to top */
  #pastToggleBtn .ptb-text {
    font-size: 9px; font-weight: 700; font-family: 'Sora', sans-serif;
    letter-spacing: 0.6px; text-transform: uppercase;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    display: block;
  }
  /* Wrapper: button + timeline side by side */
  #timelineOuter { display: flex; align-items: flex-start; gap: 8px; }

  /* History: past cols in a horizontally scrollable strip */
  #historyScroll {
    display: none; /* shown when open */
    gap: 12px;
    overflow-x: auto;
    overflow-y: clip; /* clip prevents sticky breakage unlike overflow-y:auto */
    scroll-snap-type: x mandatory;
    padding-bottom: 4px;
    flex-shrink: 0;
    max-width: 404px; /* ~1 column visible at a time; change to 808px for 2 */
  }
  #historyScroll.open { display: flex; }
  #historyScroll::-webkit-scrollbar { height: 4px; }
  #historyScroll::-webkit-scrollbar-track { background: transparent; }
  #historyScroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  #historyScroll .col-past {
    width: 392px; min-width: 392px; max-width: 392px;
    flex-shrink: 0; flex-grow: 0;
    scroll-snap-align: start;
    display: flex !important;
  }
  .card-title { font-size: 12px; font-weight: 600; color: #dde1ea; line-height: 1.3; }
  .card-desc  { font-size: 11px; color: #6b7280; margin-top: 4px; line-height: 1.5; }
  .card-links { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.05); }

  .lp   { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 500; padding: 2px 7px; border-radius: 4px; text-decoration: none; letter-spacing: 0.2px; transition: all 0.12s; border: 1px solid; }
  .ln   { color:#a0aec0; border-color:rgba(160,174,192,0.2); background:rgba(160,174,192,0.06); }
  .ln:hover  { color:#e2e8f0; background:rgba(160,174,192,0.14); border-color:rgba(160,174,192,0.4); }
  .lprd { color:#7dd3fc; border-color:rgba(125,211,252,0.2); background:rgba(125,211,252,0.06); }
  .lprd:hover{ color:#bae6fd; background:rgba(125,211,252,0.14); border-color:rgba(125,211,252,0.4); }
  .ld   { color:#f9a8d4; border-color:rgba(249,168,212,0.2); background:rgba(249,168,212,0.06); }
  .ld:hover  { color:#fbcfe8; background:rgba(249,168,212,0.14); border-color:rgba(249,168,212,0.4); }
  .lr   { color:#86efac; border-color:rgba(134,239,172,0.2); background:rgba(134,239,172,0.06); }
  .lr:hover  { color:#bbf7d0; background:rgba(134,239,172,0.14); border-color:rgba(134,239,172,0.4); }
  .lpr  { color:#fcd34d; border-color:rgba(252,211,77,0.2); background:rgba(252,211,77,0.06); }
  .lpr:hover { color:#fde68a; background:rgba(252,211,77,0.14); border-color:rgba(252,211,77,0.4); }
  .lbr  { color:#fb923c; border-color:rgba(251,146,60,0.2); background:rgba(251,146,60,0.06); }
  .lbr:hover { color:#fdba74; background:rgba(251,146,60,0.14); border-color:rgba(251,146,60,0.4); }



  .internal-label {
    font-size: 8px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 3px;
    padding: 1px 5px; margin-left: auto;
  }
  body.mode-external .internal-label { display: none; }

  /* Internal cards — hidden in External mode */
  body.mode-external .card[data-internal="true"] { display: none !important; }
  body.mode-external .sum-chip[data-internal="true"] { display: none !important; }

  /* Hide PRD links for GTM audience */
  body[data-aud="gtm"] .lprd { display: none !important; }
  /* External mode — hide internal elements */
  body.mode-external .status-badge { display: none !important; }
  body.mode-external .card-links   { display: none !important; }
  body.mode-external .card-preview-open { display: none !important; }
  body.mode-external .sum-badge    { display: none !important; }

  /* ── Internal flag ── */
  .internal-flag {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.3px;
    padding: 2px 6px; border-radius: 4px;
    background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25);
    color: #fbbf24; white-space: nowrap; flex-shrink: 0;
  }
  /* Hide in External and Custom mode */
  body.mode-external .internal-flag { display: none !important; }
  body.mode-custom   .internal-flag { display: none !important; }

  /* ── Info button & tooltip ── */
  .info-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #6b7280; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .info-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

  /* Hide info button in Summary and External modes */
  body.mode-external .info-btn { display: none !important; }

  .info-tooltip {
    position: fixed; top: 64px; right: 24px; width: 310px;
    background: #1b1f2e; border: 1px solid rgba(255,255,255,0.13);
    border-radius: 12px; padding: 16px 16px 14px;
    z-index: 9999; box-shadow: 0 24px 64px rgba(0,0,0,0.55);
    display: none;
  }
  .info-tooltip.visible { display: block; }
  .info-tooltip h3 { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 12px; letter-spacing: -0.2px; }
  .info-tooltip h4 { font-size: 9px; font-weight: 700; color: #4b5563; letter-spacing: 0.7px;
                     text-transform: uppercase; margin: 12px 0 6px; }
  .tt-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px;
             font-size: 11px; color: #9ca3af; line-height: 1.45; }
  .tt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .tt-badge { font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 8px;
              white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .tt-lp { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 500;
           padding: 1px 5px; border-radius: 3px; border: 1px solid; flex-shrink: 0; margin-top: 1px; }
  .tt-prog { height: 3px; width: 70px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; margin-top: 3px; }
  .tt-prog-fill { height: 100%; border-radius: 2px; }
  .tt-close { position: absolute; top: 10px; right: 12px; background: none; border: none;
              color: #4b5563; cursor: pointer; font-size: 18px; line-height: 1;
              padding: 2px 5px; border-radius: 4px; transition: all 0.1s; }
  .tt-close:hover { color: #fff; background: rgba(255,255,255,0.08); }

  /* Hide info button when Summary mode is active (JS toggles audienceToggle, mirror for infoBtn) */

  /* ── Custom mode ──────────────────────────────────────────────────────── */
  .mode-btn-custom { color: #a78bfa !important; }
  .mode-btn-custom.active { background: rgba(167,139,250,0.15) !important; color: #a78bfa !important; }

  body.mode-custom .card-desc.desc-gtm,
  body.mode-custom .card-desc.desc-product { display: none !important; }
  body.mode-custom .card-desc.desc-client  { display: block !important; }
  body.mode-custom .status-badge  { display: none !important; }
  body.mode-custom .card-links    { display: none !important; }
  body.mode-custom .card-meta     { display: none !important; }
  body.mode-custom .info-btn      { display: none !important; }
  body.mode-custom #audienceToggle{ display: none !important; }
  body.mode-custom .card[data-internal="true"] { display: none !important; }
  body.mode-custom .card { position: relative; }

  /* Per-card hide toggle button */
  .card-custom-toggle {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
    font-size: 13px; line-height: 1; color: #6b7280;
    transition: all 0.15s; z-index: 10; flex-shrink: 0;
  }
  body.mode-custom .card-custom-toggle { display: flex; }
  .card-custom-toggle:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.35); color: #f87171; }
  .card.custom-hidden .card-custom-toggle { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #818cf8; }
  .card.custom-hidden .card-custom-toggle::before { content: '+'; }
  .card-custom-toggle::before { content: '×'; }
  body.mode-custom .card.custom-hidden { opacity: 0.28; filter: grayscale(0.5); pointer-events: none; }
  body.mode-custom .card.custom-hidden .card-custom-toggle { pointer-events: all; }

  /* Custom toolbar */
  #customBar {
    display: none; align-items: center; gap: 10px;
    background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.2);
    border-radius: 10px; padding: 9px 14px; margin-bottom: 14px; flex-wrap: wrap;
  }
  body.mode-custom #customBar { display: flex; }
  #customBar .cb-label { font-size: 11px; font-weight: 700; color: #a78bfa; letter-spacing: 0.3px; }
  #customBar .cb-count { font-size: 11px; color: #6b7280; }
  #customBar .cb-spacer { flex: 1; }
  #customBar .cb-btn {
    font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 6px;
    border: 1px solid; cursor: pointer; transition: all 0.15s;
  }
  #customBar .cb-btn-show  { background: rgba(99,102,241,0.1);  border-color: rgba(99,102,241,0.3);  color: #818cf8; }
  #customBar .cb-btn-show:hover  { background: rgba(99,102,241,0.2); }
  #customBar .cb-btn-reset { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); color: #6b7280; }
  #customBar .cb-btn-reset:hover { background: rgba(255,255,255,0.09); color: #9ca3af; }
  #customBar .cb-btn-dl    { background: rgba(34,197,94,0.1);   border-color: rgba(34,197,94,0.3);   color: #22c55e; }
  #customBar .cb-btn-dl:hover    { background: rgba(34,197,94,0.2); }

  /* Hidden features panel */
  #hiddenPanel {
    display: none; position: fixed; top: 60px; right: 24px; width: 280px;
    max-height: 70vh; overflow-y: auto;
    background: #1b1f2e; border: 1px solid rgba(167,139,250,0.25);
    border-radius: 12px; padding: 14px 14px 10px; z-index: 9998;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }
  #hiddenPanel.visible { display: block; }
  #hiddenPanel h3 { font-size: 10px; font-weight: 700; color: #a78bfa;
                    letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 10px; }
  #hpClose { position: absolute; top: 10px; right: 12px; background: none; border: none;
             color: #4b5563; cursor: pointer; font-size: 18px; padding: 2px 5px;
             border-radius: 4px; transition: all 0.1s; }
  #hpClose:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .hp-empty { font-size: 11px; color: #4b5563; text-align: center; padding: 12px 0; }
  .hp-item { display: flex; align-items: center; gap: 8px; padding: 6px 4px;
             border-radius: 6px; cursor: pointer; transition: background 0.1s; }
  .hp-item:hover { background: rgba(255,255,255,0.05); }
  .hp-item-name { font-size: 11px; color: #d1d5db; flex: 1; line-height: 1.3; }
  .hp-item-add { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
                 border: 1px solid rgba(99,102,241,0.3); background: rgba(99,102,241,0.1);
                 color: #818cf8; white-space: nowrap; flex-shrink: 0; }
  .hp-item:hover .hp-item-add { background: rgba(99,102,241,0.2); }
  /* Custom view toggle (Monthly / Quarterly) */
  .cb-view-toggle {
    display: flex; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 2px; gap: 2px;
  }
  .cb-view-btn {
