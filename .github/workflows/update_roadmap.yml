name: Regenerate from Google Sheets

on:
  workflow_dispatch:        # manual run from Actions tab (no token needed)
  schedule:
    - cron: '0 6 * * *'     # auto-regenerate daily 06:00 UTC from the sheet
  push:
    branches: [main]
    paths:
      - 'generate_roadmap.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install gspread google-auth pandas openpyxl

      - run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - run: python generate_roadmap.py --output index.html

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=. --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
