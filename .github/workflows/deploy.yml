name: Deploy static assets to Netlify

on:
  push:
    branches: [main]
    # Only run when static assets change (PDFs, images, config).
    # index.html is generated by update_roadmap.yml and deployed from there.
    # generate_roadmap.py changes also trigger update_roadmap.yml (separate workflow).
    paths:
      - 'one-pagers/**'
      - 'netlify.toml'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=. --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
